<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Louvre Password</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    background: #000;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    color: #fff;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .ambient {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 1200px;
    height: 1200px;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0) 70%);
    pointer-events: none;
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 760px;
    padding: 80px;
    text-align: center;
    z-index: 1;
  }

  .form {
    opacity: 1;
    transform: scale(1);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .form.hidden {
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }

  .title {
    font-size: 56px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: #fff;
    margin-bottom: 64px;
  }

  .input-wrapper {
    position: relative;
  }

  .input {
    width: 100%;
    padding: 32px 88px 32px 36px;
    background: #fff;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    color: #000;
    font-family: inherit;
    font-size: 40px;
    font-weight: 500;
    letter-spacing: -0.01em;
    outline: none;
    transition: border-color 0.25s ease;
  }

  .input::placeholder {
    color: rgba(0,0,0,0.35);
  }

  .input:focus {
    border-color: rgba(255,255,255,0.3);
  }

  .check {
    position: absolute;
    right: 32px;
    top: 50%;
    transform: translateY(-50%) scale(0.7);
    opacity: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.25s ease, transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
  }

  .check.visible {
    opacity: 1;
    transform: translateY(-50%) scale(1);
  }

  .check svg {
    width: 24px;
    height: 24px;
    stroke: #fff;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .success {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(-50% + 16px));
    font-size: 140px;
    font-weight: 600;
    letter-spacing: -0.04em;
    color: #fff;
    opacity: 0;
    white-space: nowrap;
    transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.2, 0.7, 0.3, 1);
    pointer-events: none;
  }

  .success.visible {
    opacity: 1;
    transform: translate(-50%, -50%);
  }

  .confetti-piece {
    position: fixed;
    top: 50%;
    left: 50%;
    pointer-events: none;
    z-index: 10;
    border-radius: 2px;
    will-change: transform, opacity;
    animation: burst var(--duration) cubic-bezier(0.15, 0.6, 0.4, 1) forwards;
  }

  @keyframes burst {
    0% {
      opacity: 1;
      transform: translate(-50%, -50%) rotate(0);
    }
    100% {
      opacity: 0;
      transform:
        translate(
          calc(-50% + var(--tx)),
          calc(-50% + var(--ty) + 800px)
        )
        rotate(var(--rot));
    }
  }

  .toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.01em;
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    user-select: none;
    z-index: 20;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }

  .toggle:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.14);
    color: #fff;
  }

  .toggle-track {
    position: relative;
    width: 32px;
    height: 18px;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    transition: background 0.2s ease;
  }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 14px;
    height: 14px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.22s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .toggle.on .toggle-track {
    background: #22c55e;
  }

  .toggle.on .toggle-thumb {
    transform: translateX(14px);
  }
</style>
</head>
<body>
  <div class="ambient"></div>
  <main class="stage">
    <div class="form" id="form">
      <h1 class="title">Louvre Password</h1>

      <div class="input-wrapper">
        <input
          type="text"
          id="password"
          class="input"
          placeholder="Password"
          autocomplete="off"
          autocapitalize="off"
          spellcheck="false"
        />
        <div class="check" id="check">
          <svg viewBox="0 0 24 24">
            <polyline points="5 12 10 17 19 8"></polyline>
          </svg>
        </div>
      </div>
    </div>
  </main>

  <div class="success" id="success">You're in!</div>

  <button class="toggle on" id="effectsToggle" aria-pressed="true">
    <span>Effects</span>
    <span class="toggle-track"><span class="toggle-thumb"></span></span>
  </button>

  <script>
    const CORRECT_PASSWORD = 'louvre';
    const input = document.getElementById('password');
    const check = document.getElementById('check');
    const form = document.getElementById('form');
    const success = document.getElementById('success');
    const toggle = document.getElementById('effectsToggle');

    let celebrateTimer = null;
    let celebrated = false;
    let effectsEnabled = true;

    function launchConfetti() {
      const colors = ['#22c55e', '#3b82f6', '#f59e0b', '#ef4444', '#ec4899', '#a855f7', '#ffffff', '#facc15'];
      const count = 160;

      for (let i = 0; i < count; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';

        const angle = Math.random() * Math.PI * 2;
        const velocity = 200 + Math.random() * 560;
        const tx = Math.cos(angle) * velocity;
        const ty = Math.sin(angle) * velocity * 0.6 - 200;

        const w = 6 + Math.random() * 8;
        const h = 10 + Math.random() * 12;

        piece.style.width = w + 'px';
        piece.style.height = h + 'px';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.setProperty('--tx', tx + 'px');
        piece.style.setProperty('--ty', ty + 'px');
        piece.style.setProperty('--rot', (Math.random() * 1080 - 540) + 'deg');
        piece.style.setProperty('--duration', (2 + Math.random() * 1.8) + 's');

        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4000);
      }
    }

    function clearConfetti() {
      document.querySelectorAll('.confetti-piece').forEach(p => p.remove());
    }

    function celebrate() {
      if (!effectsEnabled || celebrated) return;
      celebrated = true;
      form.classList.add('hidden');
      success.classList.add('visible');
      launchConfetti();
    }

    function reset() {
      celebrated = false;
      form.classList.remove('hidden');
      success.classList.remove('visible');
      clearTimeout(celebrateTimer);
      clearConfetti();
    }

    input.addEventListener('input', () => {
      const isMatch = input.value === CORRECT_PASSWORD;
      check.classList.toggle('visible', isMatch);

      clearTimeout(celebrateTimer);

      if (isMatch && effectsEnabled) {
        celebrateTimer = setTimeout(celebrate, 500);
      } else if (celebrated) {
        reset();
      }
    });

    toggle.addEventListener('click', () => {
      effectsEnabled = !effectsEnabled;
      toggle.classList.toggle('on', effectsEnabled);
      toggle.setAttribute('aria-pressed', String(effectsEnabled));

      if (!effectsEnabled) {
        reset();
      } else if (input.value === CORRECT_PASSWORD) {
        clearTimeout(celebrateTimer);
        celebrateTimer = setTimeout(celebrate, 500);
      }
    });
  </script>
</body>
</html>
